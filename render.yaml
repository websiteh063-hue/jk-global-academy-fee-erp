services:
  - type: web
    name: jk-global-academy-erp
    runtime: node
    plan: free
    autoDeploy: false
    rootDir: .
    buildCommand: |
      cd client
      npm ci
      npm run build
      cd ../server
      npm ci
    startCommand: |
      cd server
      npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
